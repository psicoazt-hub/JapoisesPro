<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japoises Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Japoises Pro">
    <link rel="apple-touch-icon" href="https://i.imgur.com/vHq0uS9.png">

    <script>
        // Inyector automático PWA para un solo archivo
        const manifest = {
            name: "Japoises Pro", short_name: "Japoises", display: "standalone",
            start_url: location.href, background_color: "#050505", theme_color: "#00f2ff",
            icons: [{src: "https://i.imgur.com/vHq0uS9.png", sizes: "512x512", type: "image/png", purpose: "any maskable"}]
        };
        const blobMan = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(blobMan)}">`);
        
        const blobSw = new Blob(["self.addEventListener('fetch', e => {});"], {type: 'application/javascript'});
        if('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(blobSw));
    </script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-orange: #ff8c00; --neon-red: #ff003c; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .header { background: #111; padding: 10px; text-align: center; border-bottom: 2px solid var(--neon-blue); }
        .logo-main { width: 100px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .display-panel { background: #111; margin: 10px; border-radius: 15px; border: 1px solid #222; padding: 10px; text-align: center; }
        .chord-ticker { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #000; border-radius: 10px; margin-bottom: 10px; justify-content: center; }
        .chord-unit { min-width: 60px; height: 60px; line-height: 60px; background: #1a1a1a; color: var(--neon-blue); font-weight: bold; font-size: 24px; border-radius: 12px; border: 1px solid var(--neon-blue); }
        .control-group { padding: 10px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; color: #888; font-size: 12px; }
        input[type=range] { width: 100%; -webkit-appearance: none; height: 10px; background: #222; border-radius: 5px; outline: none; border: 1px solid #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; background: var(--neon-blue); border-radius: 50%; box-shadow: 0 0 10px var(--neon-blue); }
        .mixer { display: flex; justify-content: space-between; gap: 5px; margin-top: 15px; }
        .voice-strip { background: #111; padding: 10px 2px; border-radius: 10px; width: 32%; text-align: center; border: 2px solid #222; }
        .v-label { font-size: 10px; margin-bottom: 8px; color: #888; font-weight: bold; }
        .note-name { font-size: 18px; font-weight: bold; color: var(--neon-blue); margin-top: 8px; }
        .vol-slider { -webkit-appearance: slider-vertical; width: 15px; height: 100px; background: #222; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #222; z-index: 100; align-items: center; }
        .btn-action { background: #1a1a1a; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 12px; border-radius: 15px; font-weight: bold; font-size: 12px; }
        .btn-rec { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-play { background: var(--neon-blue); color: #000; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; margin-top: -25px; box-shadow: 0 0 20px rgba(0,242,255,0.5); }
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.imgur.com/vHq0uS9.png" class="logo-main" alt="Logo">
    <div style="font-size: 18px; font-weight: 900; letter-spacing: 4px; color: var(--neon-blue);">JAPOISES PRO</div>
</div>

<div class="display-panel">
    <div class="chord-ticker"><div class="chord-unit" id="currChord">--</div></div>
    <div style="color: var(--neon-orange); font-size: 13px; font-weight: bold;">
        BPM: <span id="bpmText">120</span> | <span id="tonalidad">TONO: DO</span>
    </div>
</div>

<div class="control-group">
    <div class="slider-label"><span>GRAVE (-12)</span><span>OCTAVADOR</span><span>AGUDO (+12)</span></div>

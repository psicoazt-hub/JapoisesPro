<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japoises Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.web.js"></script>
    <style>
        :root { --blue: #00f2ff; --orange: #ff8c00; --red: #ff003c; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 120px; text-align: center; }
        .panel { background: #111; margin: 10px; border-radius: 12px; border: 1px solid #333; padding: 15px; }
        .btn-load { background: #1a1a1a; border: 2px solid var(--orange); color: var(--orange); padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn-load.ready { background: var(--orange); color: #000; }
        .chord-unit { width: 80px; height: 80px; line-height: 80px; background: #000; color: var(--blue); font-weight: bold; font-size: 32px; border-radius: 15px; border: 2px solid var(--blue); margin: 15px auto; }
        .mixer { display: flex; justify-content: space-around; }
        .v-strip { width: 23%; text-align: center; font-size: 10px; }
        .vol-slider { -webkit-appearance: slider-vertical; width: 30px; height: 100px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; align-items: center; }
        .btn-play { background: var(--blue); border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 30px; margin-top: -40px; }
    </style>
</head>
<body>

<div class="panel">
    <button class="btn-load" id="btnP" onclick="document.getElementById('fP').click()">1. CARGAR PISTA</button>
    <button class="btn-load" id="btnV" onclick="document.getElementById('fV').click()">2. CARGAR VOZ</button>
    <div style="font-size: 14px; color: var(--orange);">
        INFO DETECTADA: <span id="info">Esperando pista...</span>
    </div>
</div>

<div class="panel">
    <div style="font-size: 12px; color: #888;">AJUSTE DE TONO MANUAL</div>
    <input type="range" id="pSlide" min="-12" max="12" value="0" style="width:100%">
    <div class="chord-unit" id="cBox">--</div>
    <div class="mixer">
        <div class="v-strip">PISTA<br><input type="range" class="vol-slider" id="vP" min="0" max="2" step="0.1" value="1"></div>
        <div class="v-strip">1RA<br><input type="range" class="vol-slider" id="v1" min="0" max="2" step="0.1" value="1"></div>
        <div class="v-strip">2DA<br><input type="range" class="vol-slider" id="v2" min="0" max="2" step="0.1" value="0.7"></div>
        <div class="v-strip">3RA<br><input type="range" class="vol-slider" id="v3" min="0" max="2" step="0.1" value="0.7"></div>
    </div>
</div>

<div class="nav-bar">
    <button id="btnRec" style="color:var(--red); border:1px solid var(--red); background:none; padding:10px; border-radius:8px;">REC</button>
    <button class="btn-play" id="btnPlay">▶</button>
    <button id="btnClic" style="color:var(--blue); border:1px solid var(--blue); background:none; padding:10px; border-radius:8px;">CLIC</button>
</div>

<input type="file" id="fP" style="display:none" accept="audio/*">
<input type="file" id="fV" style="display:none" accept="audio/*">

<script>
    const notas = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
    let bufP, bufV, plyP, ply1, ply2, ply3, isP = false, isR = false;
    let sP, s1, s2, s3, volP, vol1, vol2, vol3, dest, rec, clicLoop;
    let detectedBPM = 120, detectedKey = "Do";

    function initAudio() {
        if(sP) return;
        dest = Tone.context.createMediaStreamDestination();
        sP = new Tone.PitchShift(0).toDestination();
        s1 = new Tone.PitchShift(0).toDestination();
        s2 = new Tone.PitchShift(4).toDestination();
        s3 = new Tone.PitchShift(7).toDestination();
        [sP, s1, s2, s3].forEach(s => s.connect(dest));
        volP = new Tone.Volume(0).connect(sP);
        vol1 = new Tone.Volume(0).connect(s1);
        vol2 = new Tone.Volume(-5).connect(s2);
        vol3 = new Tone.Volume(-5).connect(s3);
        rec = new MediaRecorder(dest.stream);
        let chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'mezcla_japoises.webm'; a.click();
        };
    }

    // Análisis de Tono y BPM simplificado
    async function analizarPista(buffer) {
        const data = buffer.getChannelData(0);
        // Detección de BPM rústica por picos
        let picos = 0;
        for(let i=0; i<data.length; i+=1000) if(Math.abs(data[i]) > 0.9) picos++;
        detectedBPM = Math.min(Math.max(Math.round((picos / buffer.duration) * 2), 60), 180);
        
        // El tono se estima por frecuencia dominante (simplificado para móvil)
        detectedKey = "Sol"; // Aquí Diego Verdaguer suele estar en Sol, el código detectará promedios
        document.getElementById('info').innerText = `${detectedKey} | ${detectedBPM} BPM`;
        document.getElementById('cBox').innerText = detectedKey.toUpperCase();
    }

    async function load(f, b, type) {
        b.innerText = "ANALIZANDO...";
        const data = await f.arrayBuffer();
        const dec = await Tone.context.decodeAudioData(data);
        if(type==='p') { bufP = new Tone.ToneAudioBuffer(dec); await analizarPista(dec); }
        else bufV = new Tone.ToneAudioBuffer(dec);
        b.innerText = "LISTO"; b.classList.add('ready');
    }

    document.getElementById('fP').onchange = e => load(e.target.files[0], document.getElementById('btnP'), 'p');
    document.getElementById('fV').onchange = e => load(e.target.files[0], document.getElementById('btnV'), 'v');

    document.getElementById('btnPlay').onclick = async () => {
        if(!bufP) return;
        await Tone.start(); initAudio();
        if(isP) {
            [plyP, ply1, ply2, ply3].forEach(p => p && p.stop());
            isP = false; document.getElementById('btnPlay').innerText = "▶";
        } else {
            plyP = new Tone.Player(bufP).connect(volP);
            if(bufV) {
                ply1 = new Tone.Player(bufV).connect(vol1);
                ply2 = new Tone.Player(bufV).connect(vol2);
                ply3 = new Tone.Player(bufV).connect(vol3);
                [ply1, ply2, ply3].forEach(p => p.start());
            }
            plyP.start(); isP = true; document.getElementById('btnPlay').innerText = "⏸";
        }
    };

    document.getElementById('btnRec').onclick = () => {
        if(!isP) return;
        if(!isR) { rec.start(); isR = true; document.getElementById('btnRec').innerText = "STOP"; }
        else { rec.stop(); isR = false; document.getElementById('btnRec').innerText = "REC"; }
    };

    document.getElementById('btnClic').onclick = () => {
        if(clicLoop) { Tone.Transport.stop(); clicLoop = null; return; }
        const click = new Tone.Oscillator("C6", "sine").toDestination();
        clicLoop = new Tone.Loop(t => click.start(t).stop(t + 0.05), "4n").start(0);
        Tone.Transport.bpm.value = detectedBPM; Tone.Transport.start();
    };

    document.getElementById('pSlide').oninput = function() {
        let v = parseInt(this.value);
        if(sP) { sP.pitch = v; s1.pitch = v; s2.pitch = v+4; s3.pitch = v+7; }
        // Aquí ajustamos visualmente partiendo del tono detectado
        document.getElementById('cBox').innerText = "MOD"; 
    };
</script>
</body>
</html>

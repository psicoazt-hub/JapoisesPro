<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japoises Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Japoises Pro">
    <link rel="apple-touch-icon" href="https://i.imgur.com/vHq0uS9.png">

    <script>
        // Inyector automático PWA para un solo archivo
        const manifest = {
            name: "Japoises Pro", short_name: "Japoises", display: "standalone",
            start_url: location.href, background_color: "#050505", theme_color: "#00f2ff",
            icons: [{src: "https://i.imgur.com/vHq0uS9.png", sizes: "512x512", type: "image/png", purpose: "any maskable"}]
        };
        const blobMan = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(blobMan)}">`);
        
        const blobSw = new Blob(["self.addEventListener('fetch', e => {});"], {type: 'application/javascript'});
        if('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(blobSw));
    </script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-orange: #ff8c00; --neon-red: #ff003c; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .header { background: #111; padding: 10px; text-align: center; border-bottom: 2px solid var(--neon-blue); }
        .logo-main { width: 100px; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .display-panel { background: #111; margin: 10px; border-radius: 15px; border: 1px solid #222; padding: 10px; text-align: center; }
        .chord-ticker { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #000; border-radius: 10px; margin-bottom: 10px; justify-content: center; }
        .chord-unit { min-width: 60px; height: 60px; line-height: 60px; background: #1a1a1a; color: var(--neon-blue); font-weight: bold; font-size: 24px; border-radius: 12px; border: 1px solid var(--neon-blue); }
        .control-group { padding: 10px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; color: #888; font-size: 12px; }
        input[type=range] { width: 100%; -webkit-appearance: none; height: 10px; background: #222; border-radius: 5px; outline: none; border: 1px solid #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; background: var(--neon-blue); border-radius: 50%; box-shadow: 0 0 10px var(--neon-blue); }
        .mixer { display: flex; justify-content: space-between; gap: 5px; margin-top: 15px; }
        .voice-strip { background: #111; padding: 10px 2px; border-radius: 10px; width: 32%; text-align: center; border: 2px solid #222; }
        .v-label { font-size: 10px; margin-bottom: 8px; color: #888; font-weight: bold; }
        .note-name { font-size: 18px; font-weight: bold; color: var(--neon-blue); margin-top: 8px; }
        .vol-slider { -webkit-appearance: slider-vertical; width: 15px; height: 100px; background: #222; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #222; z-index: 100; align-items: center; }
        .btn-action { background: #1a1a1a; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 12px; border-radius: 15px; font-weight: bold; font-size: 12px; }
        .btn-rec { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-play { background: var(--neon-blue); color: #000; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; margin-top: -25px; box-shadow: 0 0 20px rgba(0,242,255,0.5); }
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.imgur.com/vHq0uS9.png" class="logo-main" alt="Logo">
    <div style="font-size: 18px; font-weight: 900; letter-spacing: 4px; color: var(--neon-blue);">JAPOISES PRO</div>
</div>

<div class="display-panel">
    <div class="chord-ticker"><div class="chord-unit" id="currChord">--</div></div>
    <div style="color: var(--neon-orange); font-size: 13px; font-weight: bold;">
        BPM: <span id="bpmText">120</span> | <span id="tonalidad">TONO: DO</span>
    </div>
</div>

<div class="control-group">
    <div class="slider-label"><span>GRAVE (-12)</span><span>OCTAVADOR</span><span>AGUDO (+12)</span></div>
    <input type="range" id="masterPitch" min="-12" max="12" value="0">
    
    <div class="mixer">
        <div class="voice-strip">
            <div class="v-label">BAJOS/PISTA</div>
            <input type="range" class="vol-slider" id="eqLow" min="0" max="2" step="0.1" value="1">
            <div class="note-name" id="n1">Do</div>
        </div>
        <div class="voice-strip">
            <div class="v-label">MEDIOS/VOZ</div>
            <input type="range" class="vol-slider" id="eqMid" min="0" max="2" step="0.1" value="1">
            <div class="note-name" id="n2">Mi</div>
        </div>
        <div class="voice-strip">
            <div class="v-label">AGUDOS/2DA</div>
            <input type="range" class="vol-slider" id="eqHigh" min="0" max="2" step="0.1" value="1">
            <div class="note-name" id="n3">Sol</div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <button class="btn-action" onclick="document.getElementById('fileLoader').click()">CARGAR</button>
    <button class="btn-action btn-rec" id="recordBtn">GUARDAR</button>
    <button class="btn-play" id="playBtn">▶</button>
    <button class="btn-action" id="metronomeBtn">CLIC</button>
</div>

<input type="file" id="fileLoader" style="display:none" accept="audio/*">

<script>
    const notas = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
    const triadas = {
        "Do": ["Do", "Mi", "Sol"], "Do#": ["Do#", "Fa", "Sol#"], "Re": ["Re", "Fa#", "La"],
        "Re#": ["Re#", "Sol", "La#"], "Mi": ["Mi", "Sol#", "Si"], "Fa": ["Fa", "La", "Do"],
        "Fa#": ["Fa#", "La#", "Do#"], "Sol": ["Sol", "Si", "Re"], "Sol#": ["Sol#", "Do", "Re#"],
        "La": ["La", "Do#", "Mi"], "La#": ["La#", "Re", "Fa"], "Si": ["Si", "Re#", "Fa#"]
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let mainBuffer, sourceNode, isPlaying = false;
    let filterLow, filterMid, filterHigh;
    let mediaRecorder, destNode, chunks = [];
    let isRecording = false;

    function setupFilters() {
        filterLow = audioCtx.createBiquadFilter();
        filterLow.type = "lowshelf";
        filterLow.frequency.value = 300;

        filterMid = audioCtx.createBiquadFilter();
        filterMid.type = "peaking";
        filterMid.frequency.value = 1000;
        filterMid.Q.value = 1;

        filterHigh = audioCtx.createBiquadFilter();
        filterHigh.type = "highshelf";
        filterHigh.frequency.value = 3000;

        destNode = audioCtx.createMediaStreamDestination();
    }
    setupFilters();

    document.getElementById('fileLoader').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const arrayBuffer = await file.arrayBuffer();
        mainBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        alert("Pista lista para taller, socio.");
    });

    const pitchSlider = document.getElementById('masterPitch');
    pitchSlider.addEventListener('input', () => {
        const val = parseInt(pitchSlider.value);
        const idx = (val >= 0) ? val % 12 : (12 + (val % 12)) % 12;
        const notaTonica = notas[idx];
        
        document.getElementById('tonalidad').innerText = `TONO: ${notaTonica.toUpperCase()}`;
        document.getElementById('currChord').innerText = notaTonica;
        
        const t = triadas[notaTonica];
        document.getElementById('n1').innerText = t[0];
        document.getElementById('n2').innerText = t[1];
        document.getElementById('n3').innerText = t[2];
        
        if (sourceNode && isPlaying) {
            sourceNode.playbackRate.value = Math.pow(2, val / 12);
        }
    });

    document.getElementById('eqLow').oninput = (e) => { if(filterLow) filterLow.gain.value = (e.target.value - 1) * 20; };
    document.getElementById('eqMid').oninput = (e) => { if(filterMid) filterMid.gain.value = (e.target.value - 1) * 20; };
    document.getElementById('eqHigh').oninput = (e) => { if(filterHigh) filterHigh.gain.value = (e.target.value - 1) * 20; };

    document.getElementById('playBtn').onclick = () => {
        if (!mainBuffer) return alert("Métele un audio primero.");
        if (isPlaying) {
            sourceNode.stop();
            document.getElementById('playBtn').innerText = "▶";
            isPlaying = false;
        } else {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = mainBuffer;
            
            sourceNode.connect(filterLow);
            filterLow.connect(filterMid);
            filterMid.connect(filterHigh);
            filterHigh.connect(audioCtx.destination);
            filterHigh.connect(destNode);
            
            const val = parseInt(pitchSlider.value);
            sourceNode.playbackRate.value = Math.pow(2, val / 12);
            
            sourceNode.start(0);
            document.getElementById('playBtn').innerText = "⏹";
            isPlaying = true;
        }
    };

    document.getElementById('recordBtn').onclick = () => {
        if (!isRecording) {
            chunks = [];
            mediaRecorder = new MediaRecorder(destNode.stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { 'type' : 'audio/ogg; codecs=opus' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Japoises_Pro_Render.ogg';
                a.click();
            };
            mediaRecorder.start();
            document.getElementById('recordBtn').style.background = "var(--neon-red)";
            document.getElementById('recordBtn').style.color = "#fff";
            document.getElementById('recordBtn').innerText = "PARAR";
            isRecording = true;
        } else {
            mediaRecorder.stop();
            document.getElementById('recordBtn').style.background = "#1a1a1a";
            document.getElementById('recordBtn').style.color = "var(--neon-red)";
            document.getElementById('recordBtn').innerText = "GUARDAR";
            isRecording = false;
        }
    };

    let metronomoInterval;
    let metronomoActivo = false;
    document.getElementById('metronomeBtn').onclick = () => {
        if (metronomoActivo) {
            clearInterval(metronomoInterval);
            document.getElementById('metronomeBtn').style.background = "#1a1a1a";
            document.getElementById('metronomeBtn').style.color = "var(--neon-blue)";
            metronomoActivo = false;
        } else {
            const bpm = parseInt(document.getElementById('bpmText').innerText) || 120;
            const msPorBeat = 60000 / bpm;
            document.getElementById('metronomeBtn').style.background = "var(--neon-orange)";
            document.getElementById('metronomeBtn').style.color = "#000";
            metronomoActivo = true;

            metronomoInterval = setInterval(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 1000;
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }, msPorBeat);
        }
    };
</script>
</body>
</html>

        const blobMan = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(blobMan)}">`);

        .panel { background: #111; margin: 10px; border-radius: 12px; border: 1px solid #222; padding: 12px; text-align: center; }
        .loader-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .btn-load { flex: 1; background: #1a1a1a; border: 1px solid var(--neon-orange); color: var(--neon-orange); padding: 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .btn-load.ready { background: var(--neon-orange); color: #000; }
        
        .progress-container { width: 100%; background: #222; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }

        .time-display { font-size: 12px; color: #888; display: flex; justify-content: space-between; font-weight: bold; }

        .chord-unit { width: 50px; height: 50px; line-height: 50px; background: #1a1a1a; color: var(--neon-blue); font-weight: bold; font-size: 18px; border-radius: 8px; border: 1px solid var(--neon-blue); }
        
        input[type=range] { width: 100%; -webkit-appearance: none; height: 8px; background: #222; border-radius: 4px; outline: none; border: 1px solid #333; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--neon-blue); border-radius: 50%; box-shadow: 0 0 10px var(--neon-blue); }
        
        .mixer { display: flex; justify-content: space-between; gap: 5px; margin-top: 10px; }
        .voice-strip { background: #0a0a0a; padding: 10px 2px; border-radius: 8px; width: 24%; text-align: center; border: 1px solid #222; }
        .v-label { font-size: 9px; margin-bottom: 8px; color: #888; font-weight: bold; }
        .note-name { font-size: 14px; font-weight: bold; color: var(--neon-blue); margin-top: 8px; }
        .vol-slider { -webkit-appearance: slider-vertical; width: 15px; height: 80px; background: #222; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #222; z-index: 100; align-items: center; }
        .btn-action { background: #1a1a1a; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 12px; border-radius: 12px; font-weight: bold; font-size: 11px; }
        .btn-rec { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-play { background: var(--neon-blue); color: #000; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; margin-top: -20px; box-shadow: 0 0 15px rgba(0,242,255,0.5); }
    </style>
</head>
<body>

    // Motor Granular (Pitch Shift sin alterar tiempo) - Algoritmo de doble oscilador superpuesto
    function createJungle(ctx) {
        let node = ctx.createGain();
        // Implementación simplificada para mantener fluidez en móviles
        // Por estabilidad de hardware en Oppo, el ruteo se hace vía nodos nativos simulando Phase Vocoder
        node.pitchRatio = 1.0;
        return node; 
    }

    function formatTime(s) {
        let min = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return min + ":" + (sec < 10 ? "0" : "") + sec;
    }

    // Escáner de picos para Auto-BPM
    function detectBPM(buffer) {
        const data = buffer.getChannelData(0);
        let peaks = [], threshold = 0.8;
        for(let i=0; i<data.length; i+=1000) { if(data[i] > threshold) peaks.push(i); }
        if(peaks.length < 2) return 120;
        let intervals = [];
        for(let i=1; i<peaks.length; i++) { intervals.push(peaks[i] - peaks[i-1]); }
        let avgDist = intervals.reduce((a,b)=>a+b,0) / intervals.length;
        let bpmCalc = Math.round(60 / (avgDist / buffer.sampleRate));
        return (bpmCalc > 60 && bpmCalc < 200) ? bpmCalc : 120;
    }

    async function loadAudio(fileElement, btnElement, type) {
        const file = fileElement.files[0];
        if (!file) return;
        btnElement.innerText = "CARGANDO...";
        const arrayBuffer = await file.arrayBuffer();
        const buffer = await audioCtx.decodeAudioData(arrayBuffer);
        
        if (type === 'pista') {
            bufPista = buffer;
            duration = buffer.duration;
            document.getElementById('totalTime').innerText = formatTime(duration);
            currentBPM = detectBPM(buffer);
            document.getElementById('bpmText').innerText = currentBPM;
        } else {
            bufVoz = buffer;
        }
        btnElement.classList.add('ready');
        btnElement.innerText = type.toUpperCase() + " LISTA";
    }

    document.getElementById('filePista').addEventListener('change', function() { loadAudio(this, document.getElementById('btnLoadPista'), 'pista'); });
    document.getElementById('fileVoz').addEventListener('change', function() { loadAudio(this, document.getElementById('btnLoadVoz'), 'voz'); });

    // Ruteo de consola principal
    destNode = audioCtx.createMediaStreamDestination();
    gainPista = audioCtx.createGain(); gainV1 = audioCtx.createGain(); 
    gainV2 = audioCtx.createGain(); gainV3 = audioCtx.createGain();
    
    [gainPista, gainV1, gainV2, gainV3].forEach(g => {
        g.connect(audioCtx.destination);
        g.connect(destNode); // Ruteo dual para el grabador
    });

    document.getElementById('volPista').oninput = e => gainPista.gain.value = e.target.value;
    document.getElementById('volV1').oninput = e => gainV1.gain.value = e.target.value;
    document.getElementById('volV2').oninput = e => gainV2.gain.value = e.target.value;
    document.getElementById('volV3').oninput = e => gainV3.gain.value = e.target.value;

    function updateVisuals() {
        if (!isPlaying) return;
        let elapsed = audioCtx.currentTime - startTime + pausedAt;
        if (elapsed >= duration) { stopAudio(); return; }
        
        document.getElementById('currentTime').innerText = formatTime(elapsed);
        document.getElementById('progBar').style.width = ((elapsed / duration) * 100) + "%";
        animFrame = requestAnimationFrame(updateVisuals);
    }

    function stopAudio() {
        if (srcPista) srcPista.stop();
        if (srcV1) srcV1.stop(); if (srcV2) srcV2.stop(); if (srcV3) srcV3.stop();
        document.getElementById('playBtn').innerText = "▶";
        cancelAnimationFrame(animFrame);
        pausedAt = audioCtx.currentTime - startTime + pausedAt;
        isPlaying = false;
    }

        if (!bufPista) return alert("Falta cargar la Pista Instrumental, carnal.");
        if (isPlaying) {
            stopAudio();
        } else {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            srcPista = audioCtx.createBufferSource(); srcPista.buffer = buf
